# Keep the working set in RAM on this 32GB box. The WSL swap file lives on a
# slow virtual disk (VHD); the default swappiness=60 pushes idle anonymous
# pages (e.g. long-lived editor/agent sessions) out to it. On VDI return those
# pages fault back in and stall IO, making the terminal unusable until a tmux
# reattach. 10 keeps anon pages resident and lets the kernel reclaim page cache
# first. See ~/.agent/lessons/dotfiles.md: "WSL swap thrash".
#
# Deployed to /etc/sysctl.d/99-wsl-memory.conf by install_wsl.sh and re-applied
# every boot by systemd-sysctl.service (systemd=true in /etc/wsl.conf).
vm.swappiness = 10
