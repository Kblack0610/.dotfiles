# bind p display-popup -E -w 80% -h 80% "$HOME/.local/src/tmux/spawn-project.sh"
# bind s display-popup -E -w 80% -h 80% "$HOME/.local/src/archive/tmux_spawn_server.sh"
# bind n display-popup -E -w 80% -h 80% "$HOME/.local/src/archive/tmux_nvim_spawner.sh"
# bind n display-popup -E -w 80% -h 80% "$HOME/.local/src/archive/tmux_claude_viewer.sh"
# bind l display-popup -E -w 80% -h 80% "$HOME/.local/src/tmux/launcher.sh"
# bind-key -r G run-shell "~/.local/src/term_scripts/tmux-sessionizer ~/work/nrdp"
# Press prefix + m to move the current window to a different session
bind m choose-tree -s -O name "move-window -t '%%'"

# Increase scrollback for better history capture
set -g history-limit 50000
