set-option -g default-shell /bin/zsh
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

# Allow Kitty graphics / sixel escapes through tmux (fixes `icat` gibberish on repeat)
set -g allow-passthrough on

set-option -g prefix C-b
bind-key C-b send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'
#
bind r source-file ~/.tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'wl-copy'
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel 'wl-copy'

# Scrolling with mouse
setw -g mouse on

set -g mouse on
# sane scrolling:
# bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

# Meta+hjkl to switch panes (no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Meta+Shift+hjkl to resize panes (no prefix)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"
# going to do by position for now
# Session switching by name (prefix + Alt+number)
# prefix + N to jump to hub (notes) session
# prefix + M to jump to lab session
bind N switch-client -t hub
bind M switch-client -t lab
bind -r M-1 switch-client -t hub
bind -r M-2 switch-client -t platform
bind -r M-3 switch-client -t bnb-agents
bind -r M-4 switch-client -t lab

# Window chooser with a tag column (Prefix+T sets tags; see tags.sh).
#   Prefix+w    every window, tags shown on the right
#   Prefix+C-w  only tagged windows
# Native choose-tree rather than an fzf popup: collapse/expand, incremental
# search, live preview and -Z zoom all come for free here.
bind w choose-tree -Zw -F '#{?pane_format,#{pane_current_command},#{?window_format,#{window_index}: #{window_name}#[fg=colour214]#{?@tag_important, important,}#{?@tag_pinned, pinned,}#{?@tag_agent, agent,}#{?@tag_group, [#{@tag_group}],}#[default],#{session_name}}}'
bind C-w choose-tree -Zw -f '#{||:#{@tag_important},#{||:#{@tag_pinned},#{||:#{@tag_agent},#{@tag_group}}}}'

set-option -g status-interval 3
# Disable automatic rename - let shell control window names (shows git branch)
set-option -g automatic-rename off
# set-option -g automatic-rename-format '#{b:pane_current_path}'

# Awesome setting to not exit tmux when closing a window
set-option -g detach-on-destroy off

# Status bar: short session name + claude agent status
# !n = needs attention, ~n = working, ·n = idle
set -g status-left-length 15
set -g status-left '#[fg=colour39,bold]#($HOME/.local/src/tmux/claude-status.sh)#[default] '
set -g status-right '#[fg=colour245]%H:%M'

# Window tag markers: * = important, + = pinned (see Prefix+T, tags.sh).
# Everything after the marker is tmux's stock default window format.
set -g window-status-format         '#[fg=colour214]#{?@tag_important,*,}#{?@tag_pinned,+,}#[default]#I:#W#{?window_flags,#{window_flags}, }'
set -g window-status-current-format '#[fg=colour214]#{?@tag_important,*,}#{?@tag_pinned,+,}#[default]#I:#W#{?window_flags,#{window_flags}, }'

# best for quick sesssions 
bind f display-popup -E -w 80% -h 80% "$HOME/.local/src/tmux/sessionizer.sh"
# Agent window chooser - shows all claude agent windows with status
# (Rust binary; cross-platform replacement for the old agent-chooser.sh)
bind g display-popup -E -w 100% -h 100% -B "$HOME/.local/bin/agent-panel"
bind-key G run-shell "$HOME/.local/bin/agent-panel next"
# PR viewer - shows open PRs from configured repos with status
bind p display-popup -E -w 90% -h 85% "$HOME/.local/src/tmux/pr-viewer.sh"

# Task cockpit - native fzf window over every notes profile + projects (no editor
# hosts the picker, so Esc just closes). Same practice as the agent-panel (prefix g).
bind t display-popup -E -w 100% -h 100% "$HOME/.local/src/tmux/notes-cockpit.sh"

# Session favourites - star the current claude/opencode chat, reopen it later
bind s run-shell "$HOME/.local/src/tmux/favourites.sh add"
bind o display-popup -E -w 90% -h 85% "$HOME/.local/src/tmux/favourites.sh open"

# Copy the latest Claude Code compact-summary block to the clipboard
bind-key C-y run-shell '$HOME/.local/bin/claude-copy-summary "#{pane_current_path}"'

# ── Window tags ──────────────────────────────────────────────────────────────
# Prefix+T then a letter. (Prefix+t is the notes cockpit, so tags take Shift.)
# Tags are tmux window user-options (@tag_*), not window names - the .zshrc
# precmd hook rewrites window names to the git branch on every prompt, so a
# name-based marker never survives. See .local/src/tmux/tags.sh.
#
#   T i  important     T p  pinned      T a  agent
#   T g  group:<name>  T x  clear       T l  list all tagged
#
# `switch-client -T tags` is a native one-shot key table: it returns to the
# root table after one key, so this is a real chord with no dispatcher script.
bind T switch-client -T tags
bind -T tags i run-shell "$HOME/.local/bin/tmux-tags toggle important -t '#{window_id}'"
bind -T tags p run-shell "$HOME/.local/bin/tmux-tags toggle pinned -t '#{window_id}'"
bind -T tags a run-shell "$HOME/.local/bin/tmux-tags toggle agent -t '#{window_id}'"
bind -T tags x run-shell "$HOME/.local/bin/tmux-tags clear -t '#{window_id}'"
bind -T tags g command-prompt -p "group:" "run-shell \"$HOME/.local/bin/tmux-tags add group:%% -t '#{window_id}'\""
bind -T tags l display-popup -E -w 70% -h 50% "$HOME/.local/bin/tmux-tags ls; read -n 1"
bind -T tags Escape switch-client -T root

# Prefix+W: fzf picker over tagged windows - type a tag name to filter, Enter
# jumps. Complements Prefix+C-w (same set, native chooser).
bind W display-popup -E -w 80% -h 60% "$HOME/.local/bin/tmux-tags pick"

