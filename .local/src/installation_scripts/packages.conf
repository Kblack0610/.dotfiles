#!/usr/bin/env bash
# Package Configuration File — single source of truth for installer packages.
#
# STRUCTURE:
#   PACKAGES_<CATEGORY>           — BASE: installed on every supported OS
#   PACKAGES_<CATEGORY>_<OS>      — EXTRA: additive on top of BASE for that OS
#   PACKAGE_NAME_<OS>             — naming overrides (e.g. fd → fd-find on Debian)
#
# OS suffixes: _DEBIAN, _ARCH, _MAC, _ANDROID, _WINDOWS
#
# macOS: Brewfile (~/.dotfiles/.config/brewfile/Brewfile) is the primary install
# path. The MAC entries below cover the BASE so a fresh machine without Brewfile
# still gets a usable CLI floor.
#
# Windows: see windows/install_windows.ps1. The _WINDOWS entries are winget
# package IDs (e.g. Git.Git) installed on top of WSL Debian.

# ============================================================================
# BASIC REQUIREMENTS — bare survival kit, every OS
# ============================================================================
PACKAGES_BASIC="vim wget curl git tmux stow openssh"
PACKAGES_BASIC_DEBIAN="build-essential libfuse2 software-properties-common apt-transport-https ca-certificates gnupg lsb-release"
PACKAGES_BASIC_ARCH="base-devel git-lfs fuse2"
PACKAGES_BASIC_MAC=""
PACKAGES_BASIC_ANDROID="termux-api termux-tools"
PACKAGES_BASIC_WINDOWS="Git.Git"

# ============================================================================
# DEVELOPMENT TOOLS — modern CLI floor (rust-replacement coreutils + editors)
# ============================================================================
PACKAGES_DEV="neovim lazygit ripgrep fzf jq fd bat eza zoxide tree fastfetch htop"
PACKAGES_DEV_DEBIAN=""
PACKAGES_DEV_ARCH="tree-sitter-cli grimblast dbeaver wl-clipboard xsel glances"
PACKAGES_DEV_MAC="gh"
PACKAGES_DEV_ANDROID=""
PACKAGES_DEV_WINDOWS="Neovim.Neovim BurntSushi.ripgrep.MSVC sharkdp.fd junegunn.fzf JesseDuffield.lazygit"

# ============================================================================
# TERMINAL ENHANCEMENTS — shell + novelty
# ============================================================================
PACKAGES_TERMINAL="zsh"
PACKAGES_TERMINAL_DEBIAN="fortune cowsay"
PACKAGES_TERMINAL_ARCH="fortune-mod cowsay"
PACKAGES_TERMINAL_MAC="cowsay fortune"
PACKAGES_TERMINAL_ANDROID="cowsay fortune"
PACKAGES_TERMINAL_WINDOWS="Starship.Starship gerardog.gsudo"

# ============================================================================
# GUI APPLICATIONS — Hyprland/Wayland on Linux; mac uses Brewfile casks
# ============================================================================
PACKAGES_GUI=""
PACKAGES_GUI_DEBIAN="hyprland hyprpaper waybar wofi firefox kitty"
PACKAGES_GUI_ARCH="hyprland hyprpaper waybar wofi firefox kitty"
PACKAGES_GUI_MAC=""
PACKAGES_GUI_ANDROID=""
PACKAGES_GUI_WINDOWS="Microsoft.WindowsTerminal glzr-io.glazewm DEVCOM.JetBrainsMonoNerdFont"

# ============================================================================
# LANGUAGE/RUNTIME — package-managed runtimes only.
# Node on Debian comes from NodeSource (apt's is stale) so it's handled
# directly in install_debian.sh::install_runtime, not via the catalog.
# Rust comes from rustup on every Linux/Mac OS, also out-of-band.
# ============================================================================
PACKAGES_RUNTIME=""
PACKAGES_RUNTIME_DEBIAN="python3 python3-pip python3-venv pipx"
PACKAGES_RUNTIME_ARCH="nodejs npm python python-pip"
PACKAGES_RUNTIME_MAC=""
PACKAGES_RUNTIME_ANDROID="nodejs python python-pip"
PACKAGES_RUNTIME_WINDOWS=""

# ============================================================================
# NAMING OVERRIDES — only when the same logical tool has a different package
# name on a particular OS. Default behavior is pass-through.
# ============================================================================
# `declare -gA` is required because packages.conf is sourced inside the
# load_config() function — without -g, the arrays would be function-local.
declare -gA PACKAGE_NAME_DEBIAN=( [fd]=fd-find )
declare -gA PACKAGE_NAME_MAC=( [nodejs]=node )

# ============================================================================
# NPM GLOBAL PACKAGES (consumed by base_functions.sh::install_npm_packages)
# ============================================================================
NPM_PACKAGES="opencode-ai @google/gemini-cli"

# ============================================================================
# NERD FONTS
# ============================================================================
NERD_FONTS="Hack 3270 0xProto SymbolsOnly"

# ============================================================================
# OH-MY-ZSH PLUGINS
# ============================================================================
OH_MY_ZSH_PLUGINS="zsh-autosuggestions zsh-syntax-highlighting"

# ============================================================================
# FLATPAK APPLICATIONS (Linux only)
# ============================================================================
FLATPAK_APPS="one.ablaze.floorp"
