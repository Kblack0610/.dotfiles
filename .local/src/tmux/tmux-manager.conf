# Tmux Session Manager Configuration
# Used by: dashboard.sh, stale-detector.sh, cleanup.sh, history-capture.sh

# Stale detection threshold in seconds (default: 15 minutes)
STALE_THRESHOLD=900

# Dashboard auto-refresh interval in seconds
DASHBOARD_REFRESH=3

# History save location
HISTORY_DIR="$HOME/.local/share/tmux-history"

# Process names considered "agent" processes (regex)
AGENT_PATTERNS="^(claude|claude-real|aider|codex|opencode|gemini)$"

# Window name patterns considered "agent" windows (for stale detection)
AGENT_WINDOW_PATTERNS="agent|claude|aider|codex|opencode|gemini"

# Agent attention patterns — detect when agent is blocked/waiting for human input
# Covers: Claude (Tool Use, Allow), Codex (sandbox, execute), generic (Y/n, confirm, etc.)
AGENT_ATTENTION_PATTERN="\\[Y/n\\]|\\[y/N\\]|yes.*no.*:|proceed\\?|Allow.*once|Allow.*always|Deny|Do you want to|Approve|Continue\\?|Press Enter|confirmation required|Confirm|sandbox.*approve|execute.*command|Tool Use:.*Allow|wants to|waiting for.*input|human.*review|permission.*required|allow this|run this|accept\\?"

# Auto-save history before cleanup (1=yes, 0=no)
AUTO_SAVE_HISTORY=1

# Maximum history files to keep per session (0=unlimited)
# When exceeded, oldest files are deleted
MAX_HISTORY_FILES=50
