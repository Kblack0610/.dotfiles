# GlazeWM config.
#
# IMPORTANT — manual copy required:
#   This repo lives in WSL. GlazeWM runs on the Windows host and reads
#   %USERPROFILE%\.glzr\glazewm\config.yaml. Stow can't bridge WSL → Windows,
#   so after editing this file you must copy it across. From PowerShell:
#     Copy-Item \\wsl$\<distro>\root\.dotfiles\.config\windows\glazewm\config.yaml `
#               $env:USERPROFILE\.glzr\glazewm\config.yaml
#   Then reload with lwin+shift+r (wm-reload-config) inside GlazeWM.
#
# i3/Hyprland-style keybinds. Animations disabled because the VDI renders
# over Azure RDP and animations stutter.
#
# Mod key is `lwin` (Super/Windows), matching the Hyprland config so there's
# one muscle memory across both environments. This works ONLY because the
# session is reached through a *native* RDP client (FreeRDP / the Windows
# App / MSRDC), which has a kernel-adjacent keyboard hook and forwards raw
# LWin to the remote session. If you ever go back to the Azure AVD *browser*
# web client, `lwin+...` bindings will silently stop firing (Microsoft omits
# Meta from Chromium's keyboard.lock() set and only maps Alt+F3 -> a one-shot
# Win tap, useless as a held mod) — revert this file's mod key to `alt`.
# See .agent/lessons/dotfiles.md ("GlazeWM under Azure AVD web client...").

workspaces:
  - name: "1"
    display_name: "1 · term"
  - name: "2"
    display_name: "2 · web"
  - name: "3"
    display_name: "3 · code"
  - name: "4"
    display_name: "4 · chat"
  - name: "5"
    display_name: "5 · agent"

window_rules:
  - commands: ["ignore"]
    match:
      # Zebar's widget windows. Without this rule, GlazeWM tiles the bar as a
      # regular managed window and it renders as a block in the middle of the
      # screen instead of as a borderless top overlay.
      - window_process: { equals: "zebar" }
      - window_process: { equals: "Windows.App" }
      - window_process: { equals: "msrdc" }
      - window_process: { equals: "ApplicationFrameHost" }
      - window_class: { regex: ".*Microsoft\\.AAD\\.BrokerPlugin.*" }
      # Flow Launcher (launcher popup opened via lwin+d in the keybindings
      # below) and PowerToys (FancyZones, Keyboard Manager) are
      # floating overlays, not tileable windows.
      - window_process: { equals: "Flow.Launcher" }
      - window_process: { equals: "PowerToys" }
      - window_class: { regex: "HwndWrapper.*PowerToys.*" }

  # App routing — labels in `workspaces:` above are cosmetic, these rules
  # are what actually pins each app to its home workspace.
  - commands: ["move --workspace 1"]
    match:
      - window_process: { equals: "WindowsTerminal" }
  - commands: ["move --workspace 2"]
    match:
      - window_process: { regex: "(msedge|chrome|brave|firefox)" }
  - commands: ["move --workspace 3"]
    match:
      - window_process: { regex: "(Code|devenv|idea64|rider64)" }
  - commands: ["move --workspace 4"]
    match:
      - window_process: { regex: "(ms-teams|Teams|slack|Discord)" }

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # Launchers
  - commands: ["shell-exec explorer.exe"]
    bindings: ["lwin+e"]
  - commands: ["shell-exec wt.exe nvim"]
    bindings: ["lwin+n"]
  - commands: ["shell-exec wt.exe psmux"]
    bindings: ["lwin+t"]
  # Flow Launcher — Super+D parity with Hyprland's `$mainMod, D`. Flow's own
  # hotkey is disabled (flow-launcher/Settings.json "Hotkey": "") because a
  # RegisterHotKey on Win+D loses to the shell's Show-Desktop. GlazeWM's
  # low-level hook wins, so it opens Flow by relaunching the single-instance
  # stub (a 2nd launch signals the running instance to show its search box).
  # Stable stub path, not the versioned app-*/ dir. Keeps Alt+D free.
  - commands: ["shell-exec %LocalAppData%/FlowLauncher/Flow.Launcher.exe"]
    bindings: ["lwin+d"]

  # Screenshot — region-select via built-in Snipping Tool, then bridge the
  # image from Windows clipboard into the WSL (Arch) Wayland clipboard so
  # TUI apps under WSLg (e.g. Claude Code) can paste it. WSLg shares text
  # clipboard automatically but not image/png; snip-to-wsl.ps1 forces it.
  # Requires `wl-clipboard` inside the Arch distro.
  - commands: ["shell-exec powershell -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File %userprofile%/.dotfiles/.config/windows/scripts/snip-to-wsl.ps1"]
    bindings: ["lwin+g"]

  # Close focused
  - commands: ["close"]
    bindings: ["lwin+shift+q"]

  # Reload config
  - commands: ["wm-reload-config"]
    bindings: ["lwin+shift+r"]

  # Exit GlazeWM
  - commands: ["wm-exit"]
    bindings: ["lwin+shift+e"]

  # Toggle floating / tiling / fullscreen
  - commands: ["toggle-floating --centered"]
    bindings: ["lwin+shift+space"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["lwin+v"]
  - commands: ["toggle-fullscreen"]
    bindings: ["lwin+f"]

  # Focus (i3/Hyprland-style: mod + hjkl / arrows).
  # NOTE: alt+hjkl stays free (unbound) on purpose so those keys pass through
  # to the terminal for tmux's M-hjkl select-pane (.tmux.conf:26-29). GlazeWM
  # focus now lives on lwin, so alt is no longer needed as a workaround mod.
  - commands: ["focus --direction left"]
    bindings: ["lwin+h", "lwin+left"]
  - commands: ["focus --direction right"]
    bindings: ["lwin+l", "lwin+right"]
  - commands: ["focus --direction up"]
    bindings: ["lwin+k", "lwin+up"]
  - commands: ["focus --direction down"]
    bindings: ["lwin+j", "lwin+down"]

  # Move focused window (mod + shift + hjkl / arrows)
  - commands: ["move --direction left"]
    bindings: ["lwin+shift+h", "lwin+shift+left"]
  - commands: ["move --direction right"]
    bindings: ["lwin+shift+l", "lwin+shift+right"]
  - commands: ["move --direction up"]
    bindings: ["lwin+shift+k", "lwin+shift+up"]
  - commands: ["move --direction down"]
    bindings: ["lwin+shift+j", "lwin+shift+down"]

  # Resize mode
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["lwin+r"]

  # Workspaces
  - commands: ["focus --workspace 1"]
    bindings: ["lwin+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["lwin+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["lwin+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["lwin+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["lwin+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["lwin+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["lwin+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["lwin+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["lwin+9"]
  - commands: ["focus --recent-workspace"]
    bindings: ["lwin+tab"]

  # Move window to workspace
  - commands: ["move --workspace 1"]
    bindings: ["lwin+shift+1"]
  - commands: ["move --workspace 2"]
    bindings: ["lwin+shift+2"]
  - commands: ["move --workspace 3"]
    bindings: ["lwin+shift+3"]
  - commands: ["move --workspace 4"]
    bindings: ["lwin+shift+4"]
  - commands: ["move --workspace 5"]
    bindings: ["lwin+shift+5"]
  - commands: ["move --workspace 6"]
    bindings: ["lwin+shift+6"]
  - commands: ["move --workspace 7"]
    bindings: ["lwin+shift+7"]
  - commands: ["move --workspace 8"]
    bindings: ["lwin+shift+8"]
  - commands: ["move --workspace 9"]
    bindings: ["lwin+shift+9"]
