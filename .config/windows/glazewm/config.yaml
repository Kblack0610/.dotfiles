# GlazeWM config.
#
# IMPORTANT — manual copy required:
#   This repo lives in WSL. GlazeWM runs on the Windows host and reads
#   %USERPROFILE%\.glzr\glazewm\config.yaml. Stow can't bridge WSL → Windows,
#   so after editing this file you must copy it across. From PowerShell:
#     Copy-Item \\wsl$\<distro>\root\.dotfiles\.config\windows\glazewm\config.yaml `
#               $env:USERPROFILE\.glzr\glazewm\config.yaml
#   Then reload with alt+shift+r (wm-reload-config) inside GlazeWM.
#
# i3/Hyprland-style keybinds. Animations disabled because the VDI renders
# over Azure RDP and animations stutter.
#
# Mod key is `alt` (not `lwin`) on purpose: this dotfiles setup is used
# from the Azure AVD *browser* web client, which deliberately does NOT
# forward raw LWin/MetaLeft keystrokes to the remote session. Microsoft
# uses Chromium's `navigator.keyboard.lock()` for some system keys but
# omits Meta from the locked set; instead Alt+F3 sends a one-shot Win
# tap. That single-tap cannot serve as a held mod, so `lwin+1` style
# bindings can never fire from the web client. See
# .agent/lessons/dotfiles.md ("GlazeWM under Azure AVD web client...")
# for the workarounds if you ever want lwin back.

workspaces:
  - name: "1"
    display_name: "1 · term"
  - name: "2"
    display_name: "2 · web"
  - name: "3"
    display_name: "3 · code"
  - name: "4"
    display_name: "4 · chat"
  - name: "5"
    display_name: "5 · agent"

window_rules:
  - commands: ["ignore"]
    match:
      # Zebar's widget windows. Without this rule, GlazeWM tiles the bar as a
      # regular managed window and it renders as a block in the middle of the
      # screen instead of as a borderless top overlay.
      - window_process: { equals: "zebar" }
      - window_process: { equals: "Windows.App" }
      - window_process: { equals: "msrdc" }
      - window_process: { equals: "ApplicationFrameHost" }
      - window_class: { regex: ".*Microsoft\\.AAD\\.BrokerPlugin.*" }
      # PowerToys Run is a floating launcher popup, not a tileable window.
      - window_process: { equals: "PowerToys" }
      - window_class: { regex: "HwndWrapper.*PowerToys.*" }

  # App routing — labels in `workspaces:` above are cosmetic, these rules
  # are what actually pins each app to its home workspace.
  - commands: ["move --workspace 1"]
    match:
      - window_process: { equals: "WindowsTerminal" }
  - commands: ["move --workspace 2"]
    match:
      - window_process: { regex: "(msedge|chrome|brave|firefox)" }
  - commands: ["move --workspace 3"]
    match:
      - window_process: { regex: "(Code|devenv|idea64|rider64)" }
  - commands: ["move --workspace 4"]
    match:
      - window_process: { regex: "(ms-teams|Teams|slack|Discord)" }

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # Spawn terminal — Windows Terminal opening WSL Debian by default
  - commands: ["shell-exec wt.exe"]
    bindings: ["alt+enter"]

  # Launchers
  - commands: ["shell-exec explorer.exe"]
    bindings: ["alt+e"]
  - commands: ["shell-exec wt.exe nvim"]
    bindings: ["alt+n"]
  - commands: ["shell-exec wt.exe psmux"]
    bindings: ["alt+t"]

  # Screenshot — region-select via built-in Snipping Tool, then bridge the
  # image from Windows clipboard into the WSL (Arch) Wayland clipboard so
  # TUI apps under WSLg (e.g. Claude Code) can paste it. WSLg shares text
  # clipboard automatically but not image/png; snip-to-wsl.ps1 forces it.
  # Requires `wl-clipboard` inside the Arch distro.
  - commands: ["shell-exec powershell -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File %userprofile%/.dotfiles/.config/windows/scripts/snip-to-wsl.ps1"]
    bindings: ["alt+s"]

  # Close focused
  - commands: ["close"]
    bindings: ["alt+shift+q"]

  # Reload config
  - commands: ["wm-reload-config"]
    bindings: ["alt+shift+r"]

  # Exit GlazeWM
  - commands: ["wm-exit"]
    bindings: ["alt+shift+e"]

  # Toggle floating / tiling / fullscreen
  - commands: ["toggle-floating --centered"]
    bindings: ["alt+shift+space"]
  - commands: ["toggle-tiling-direction"]
    bindings: ["alt+v"]
  - commands: ["toggle-fullscreen"]
    bindings: ["alt+f"]

  # Focus
  - commands: ["focus --direction left"]
    bindings: ["alt+h", "alt+left"]
  - commands: ["focus --direction right"]
    bindings: ["alt+l", "alt+right"]
  - commands: ["focus --direction up"]
    bindings: ["alt+k", "alt+up"]
  - commands: ["focus --direction down"]
    bindings: ["alt+j", "alt+down"]

  # Move (ctrl+shift — alt+shift was eaten by Windows input-language toggle)
  - commands: ["move --direction left"]
    bindings: ["ctrl+shift+h", "ctrl+shift+left"]
  - commands: ["move --direction right"]
    bindings: ["ctrl+shift+l", "ctrl+shift+right"]
  - commands: ["move --direction up"]
    bindings: ["ctrl+shift+k", "ctrl+shift+up"]
  - commands: ["move --direction down"]
    bindings: ["ctrl+shift+j", "ctrl+shift+down"]

  # Resize mode
  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["alt+r"]

  # Workspaces
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["alt+9"]
  - commands: ["focus --recent-workspace"]
    bindings: ["alt+tab"]

  # Move window to workspace
  - commands: ["move --workspace 1"]
    bindings: ["ctrl+alt+1"]
  - commands: ["move --workspace 2"]
    bindings: ["ctrl+alt+2"]
  - commands: ["move --workspace 3"]
    bindings: ["ctrl+alt+3"]
  - commands: ["move --workspace 4"]
    bindings: ["ctrl+alt+4"]
  - commands: ["move --workspace 5"]
    bindings: ["ctrl+alt+5"]
  - commands: ["move --workspace 6"]
    bindings: ["ctrl+alt+6"]
  - commands: ["move --workspace 7"]
    bindings: ["ctrl+alt+7"]
  - commands: ["move --workspace 8"]
    bindings: ["ctrl+alt+8"]
  - commands: ["move --workspace 9"]
    bindings: ["ctrl+alt+9"]
