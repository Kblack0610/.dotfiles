add_newline = false

command_timeout = 3000

# A minimal left prompt
format = """$os$directory$git_branch$fill $cmd_duration$status$nodejs
$character"""

[fill]
symbol = "ŌöĆ"
style = "#9098a4"

[nodejs]
symbol = "Ņ£ś "
format = "[$symbol($version )](bold green)"
# Only show in node projects
detect_extensions = []
detect_files = ['package.json', '.node-version', '.nvmrc']

[character]
success_symbol = "[ŌØ»](bold #AB8CAE)"
error_symbol = "[ŌØ»](bold #E59DB1)"
vimcmd_symbol = "[ŌØ«](bold #AB8CAE)"

[git_branch]
symbol = "’Éś "
format = '[$symbol$branch]($style) '
style = 'bold #AB8CAE'

[directory]
read_only = " ¾░īŠ"
style = "#cedaeb"
truncation_symbol = ""
truncation_length = 10

[cmd_duration]
min_time = 30_000
style = "#9098a4"
format = '[$duration]($style) '

[line_break]
disabled = false

[status]
disabled = false
symbol = 'Ō£ś '

