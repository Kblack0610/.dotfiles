# Hyprland config — modular split across conf.d/
# Edit individual sections in ~/.config/hypr/conf.d/<name>.conf
#
# Source order matters: variables must be defined before they are referenced.
#   programs.conf       defines $terminal / $fileManager / $menu  (used by autostart, keybindings)
#   keybindings.conf    defines $mainMod                          (self-contained at top of file)

source = ~/.config/hypr/conf.d/programs.conf
source = ~/.config/hypr/conf.d/env.conf
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/look-and-feel.conf
source = ~/.config/hypr/conf.d/input.conf
source = ~/.config/hypr/conf.d/rules.conf
source = ~/.config/hypr/conf.d/keybindings.conf
