#################
### AUTOSTART ###
#################

# This line ensures D-Bus and systemd services know about your Wayland session environment variables.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpaper
exec-once = $terminal
exec-once = ~/.local/bin/theme-auto

# Status bar
# exec-once = waybar

# Agent monitoring panel (layer-shell) - disabled, input region issue
# exec-once = ~/dev/home/binks-agent-orchestrator/apps/agent-panel/target/release/agent-panel
