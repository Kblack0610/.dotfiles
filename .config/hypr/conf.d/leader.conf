####################
### PIN LEADER   ###
####################
# tmux-style prefix menu for the mini pin (see ~/.config/waybar/PIN.md).
# Super+; opens a which-key popup; single keys fire actions; submaps nest 3 deep.
#   L1 pinbar -> L2 pinbar-utils -> L3 pinbar-sync / pinbar-git
# esc = up one level, q = exit. $mainMod comes from keybindings.conf (sourced first).
#
# Swap the leader key: comment the semicolon pair below, uncomment one alt pair.
# bind = $mainMod, semicolon, exec, ~/.config/waybar/pin-hint.sh main
# bind = $mainMod, semicolon, submap, pinbar
# bind = $mainMod, space, exec, ~/.config/waybar/pin-hint.sh main
# bind = $mainMod, space, submap, pinbar
bind = $mainMod, A, exec, ~/.config/waybar/pin-hint.sh main
bind = $mainMod, A, submap, pinbar

# --- L1: pinbar (common actions) ---
submap = pinbar
bind = , t, exec, ~/.config/waybar/pin.sh toggle
bind = , t, exec, ~/.config/waybar/pin-hint.sh close
bind = , t, submap, reset
bind = , s, exec, ~/.config/waybar/pin.sh size
bind = , s, exec, ~/.config/waybar/pin-hint.sh close
bind = , s, submap, reset
bind = , a, exec, kitty --class floating-term -e $HOME/.local/bin/agent-panel
bind = , a, exec, ~/.config/waybar/pin-hint.sh close
bind = , a, submap, reset
bind = , h, exec, kitty --class floating-term -e $HOME/.config/waybar/machines.sh pick
bind = , h, exec, ~/.config/waybar/pin-hint.sh close
bind = , h, submap, reset
bind = , u, exec, ~/.config/waybar/pin-hint.sh utils
bind = , u, submap, pinbar-utils
bind = , escape, exec, ~/.config/waybar/pin-hint.sh close
bind = , escape, submap, reset
bind = , q, exec, ~/.config/waybar/pin-hint.sh close
bind = , q, submap, reset

# --- L2: pinbar-utils ---
submap = pinbar-utils
bind = , r, exec, ~/.config/waybar/pin.sh reload
bind = , r, exec, ~/.config/waybar/pin-hint.sh close
bind = , r, submap, reset
bind = , y, exec, ~/.config/waybar/pin-hint.sh sync
bind = , y, submap, pinbar-sync
bind = , g, exec, ~/.config/waybar/pin-hint.sh git
bind = , g, submap, pinbar-git
bind = , escape, exec, ~/.config/waybar/pin-hint.sh main
bind = , escape, submap, pinbar
bind = , q, exec, ~/.config/waybar/pin-hint.sh close
bind = , q, submap, reset

# --- L3: pinbar-sync ---
submap = pinbar-sync
bind = , d, exec, kitty --class floating-term -e sh -c 'cd $HOME/.dotfiles && stow -v . ; echo ; echo [done] ; read -r _'
bind = , d, exec, ~/.config/waybar/pin-hint.sh close
bind = , d, submap, reset
bind = , n, exec, kitty --class floating-term -e sh -c 'git -C $HOME/.notes pull --ff-only ; echo ; read -r _'
bind = , n, exec, ~/.config/waybar/pin-hint.sh close
bind = , n, submap, reset
bind = , escape, exec, ~/.config/waybar/pin-hint.sh utils
bind = , escape, submap, pinbar-utils
bind = , q, exec, ~/.config/waybar/pin-hint.sh close
bind = , q, submap, reset

# --- L3: pinbar-git ---
submap = pinbar-git
bind = , p, exec, kitty --class floating-term -e sh -c 'for d in $HOME/.dotfiles $HOME/.notes ; do echo "== $d ==" ; git -C "$d" pull --ff-only ; done ; echo ; read -r _'
bind = , p, exec, ~/.config/waybar/pin-hint.sh close
bind = , p, submap, reset
bind = , s, exec, kitty --class floating-term -e sh -c 'git -C $HOME/.dotfiles status ; echo ; read -r _'
bind = , s, exec, ~/.config/waybar/pin-hint.sh close
bind = , s, submap, reset
bind = , escape, exec, ~/.config/waybar/pin-hint.sh utils
bind = , escape, submap, pinbar-utils
bind = , q, exec, ~/.config/waybar/pin-hint.sh close
bind = , q, submap, reset

submap = reset
