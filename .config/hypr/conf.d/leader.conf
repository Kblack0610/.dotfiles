####################
### PIN LEADER   ###
####################
# tmux-style prefix menu for the mini pin (see ~/.config/waybar/PIN.md).
# Super+; opens a which-key popup; single keys fire actions; submaps nest 3 deep.
#   L1 pinbar -> L2 pinbar-utils -> L3 pinbar-sync / pinbar-git
# esc = up one level, q = exit. $mainMod comes from keybindings.conf (sourced first).
#
# Swap the leader key: comment the semicolon pair below, uncomment one alt pair.
# bind = $mainMod, semicolon, exec, ~/.config/waybar/pin-hint.sh main
# bind = $mainMod, semicolon, submap, pinbar
# bind = $mainMod, space, exec, ~/.config/waybar/pin-hint.sh main
# bind = $mainMod, space, submap, pinbar
bind = $mainMod, A, exec, ~/.config/waybar/pin-hint.sh main
bind = $mainMod, A, submap, pinbar

# --- Remote-friendly entry (RustDesk / driving this box from outside) ---
# The Super/Meta key is usually NOT forwarded by remote-desktop clients, so the
# Super+A / Super+Shift+M binds above are dead when you control this machine
# remotely. These use Ctrl+Shift (forwards cleanly, fast to hit) and are `bindp`
# (dontInhibit) so they fire even in GRAB ON / full-passthrough mode. You can
# always reach the pin from outside. Note: global, so they shadow Ctrl+Shift+M/A
# in every app (terminals included).
bindp = CTRL SHIFT, M, exec, ~/.config/waybar/pin.sh toggle   # direct toggle
bindp = CTRL SHIFT, A, exec, ~/.config/waybar/pin-hint.sh main  # leader menu
bindp = CTRL SHIFT, A, submap, pinbar

# --- L1: pinbar (only: toggle, utils, settings) ---
submap = pinbar
bindp = ,t, exec, ~/.config/waybar/pin.sh toggle
bindp = ,t, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,t, submap, reset
bindp = ,u, exec, ~/.config/waybar/pin-hint.sh utils
bindp = ,u, submap, pinbar-utils
bindp = ,s, exec, ~/.config/waybar/pin-hint.sh settings
bindp = ,s, submap, pinbar-settings
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,escape, submap, reset
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

# --- L2: pinbar-utils (agents, ssh, reload, + nested timebox/sync/git) ---
submap = pinbar-utils
bindp = ,a, exec, kitty --class floating-term -e $HOME/.local/bin/agent-panel
bindp = ,a, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,a, submap, reset
bindp = ,h, exec, kitty --class floating-term -e $HOME/.config/waybar/machines.sh pick
bindp = ,h, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,h, submap, reset
bindp = ,r, exec, ~/.config/waybar/pin.sh reload
bindp = ,r, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,r, submap, reset
bindp = ,t, exec, ~/.config/waybar/pin-hint.sh timebox
bindp = ,t, submap, pinbar-timebox
bindp = ,y, exec, ~/.config/waybar/pin-hint.sh sync
bindp = ,y, submap, pinbar-sync
bindp = ,g, exec, ~/.config/waybar/pin-hint.sh git
bindp = ,g, submap, pinbar-git
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh main
bindp = ,escape, submap, pinbar
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

# --- L2: pinbar-settings ---
submap = pinbar-settings
bindp = ,s, exec, ~/.config/waybar/pin.sh size
bindp = ,s, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,s, submap, reset
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh main
bindp = ,escape, submap, pinbar
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

# --- L3: pinbar-timebox ---
submap = pinbar-timebox
bindp = ,s, exec, kitty --class floating-term -e sh -c 'printf "start op: " ; read -r op ; [ -n "$op" ] || exit ; printf "lap [e.g. 25m, blank=default]: " ; read -r lap ; if [ -n "$lap" ] ; then $HOME/.local/bin/timebox start "$op" --lap "$lap" ; else $HOME/.local/bin/timebox start "$op" ; fi'
bindp = ,s, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,s, submap, reset
bindp = ,w, exec, kitty --class floating-term -e sh -c 'printf "switch to op: " ; read -r op ; [ -n "$op" ] || exit ; printf "lap [e.g. 25m, blank=default]: " ; read -r lap ; if [ -n "$lap" ] ; then $HOME/.local/bin/timebox switch "$op" --lap "$lap" ; else $HOME/.local/bin/timebox switch "$op" ; fi'
bindp = ,w, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,w, submap, reset
bindp = ,p, exec, $HOME/.local/bin/timebox pause
bindp = ,p, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,p, submap, reset
bindp = ,r, exec, $HOME/.local/bin/timebox resume
bindp = ,r, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,r, submap, reset
bindp = ,x, exec, $HOME/.local/bin/timebox stop --all
bindp = ,x, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,x, submap, reset
bindp = ,o, exec, kitty --class floating-term -e sh -c '$HOME/.local/bin/timebox status ; echo ; $HOME/.local/bin/timebox stats ; echo ; read -r _'
bindp = ,o, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,o, submap, reset
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh utils
bindp = ,escape, submap, pinbar-utils
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

# --- L3: pinbar-sync ---
submap = pinbar-sync
bindp = ,d, exec, kitty --class floating-term -e sh -c 'cd $HOME/.dotfiles && stow -v . ; echo ; echo [done] ; read -r _'
bindp = ,d, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,d, submap, reset
bindp = ,n, exec, kitty --class floating-term -e sh -c 'git -C $HOME/.notes pull --ff-only ; echo ; read -r _'
bindp = ,n, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,n, submap, reset
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh utils
bindp = ,escape, submap, pinbar-utils
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

# --- L3: pinbar-git ---
submap = pinbar-git
bindp = ,p, exec, kitty --class floating-term -e sh -c 'for d in $HOME/.dotfiles $HOME/.notes ; do echo "== $d ==" ; git -C "$d" pull --ff-only ; done ; echo ; read -r _'
bindp = ,p, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,p, submap, reset
bindp = ,s, exec, kitty --class floating-term -e sh -c 'git -C $HOME/.dotfiles status ; echo ; read -r _'
bindp = ,s, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,s, submap, reset
bindp = ,escape, exec, ~/.config/waybar/pin-hint.sh utils
bindp = ,escape, submap, pinbar-utils
bindp = ,q, exec, ~/.config/waybar/pin-hint.sh close
bindp = ,q, submap, reset

submap = reset
