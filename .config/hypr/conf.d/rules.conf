### RULES ###

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = match:float false, match:workspace w[tv1], border_size 0
# windowrule = match:float false, match:workspace w[tv1], rounding 0
# windowrule = match:float false, match:workspace f[1], border_size 0
# windowrule = match:float false, match:workspace f[1], rounding 0

windowrule = match:class ^(kitty)$, workspace 1
windowrule = match:class ^(firefox)$, workspace 2

windowrule = match:class ^(slack)$, workspace 4
windowrule = match:class ^(discord)$, workspace 4

# Unity - keep Hub out of the editor workspace
windowrule = match:class ^(unityhub)$, workspace 8
windowrule = match:class ^(Unity)$, match:float false, workspace 3, group set

# TigerVNC viewer — locked to workspace 5
windowrule = match:class ^(Vncviewer)$, workspace 5

# RustDesk grabs ALL keys via the Wayland keyboard-shortcuts-inhibit protocol
# (same mechanism Moonlight uses). Rather than a static per-window rule, this is
# now a runtime toggle via binds:disable_keybind_grabbing (default off = compositor
# control) — see keybindings.conf (Ctrl+Alt+Shift+G) and scripts/rustdesk-grab-toggle.sh.

# Android/Testing tools — locked to workspace 7
windowrule = match:class ^(scrcpy)$, workspace 6, group barred
windowrule = match:class ^(chromium|Chromium|chrome|Chrome|google-chrome|Google-chrome)$, match:title :.*Playwright.*, workspace 7, no_initial_focus true, suppress_event activate
windowrule = match:class ^(firefox-default)$, workspace 7, no_initial_focus true, suppress_event activate
windowrule = match:class ^([Ee]mulator(64)?(-arm)?|qemu-system)$, workspace 7, no_initial_focus true, suppress_event activate
