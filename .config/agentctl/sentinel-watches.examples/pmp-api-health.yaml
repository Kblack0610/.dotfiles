# EXAMPLE — copy to ~/.agent/watches/<name>.yaml to activate (or use: sentinel watch ...).
# http probe: TRIP when the endpoint doesn't return the expected status.
name: pmp-api-health
description: PlaceMyParents API liveness
probe: http
target: https://api.placemyparents.com/health
expect_status: 200
interval: 5m
expiry: null
severity: high
source: user
