# EXAMPLE — agent probe (fuzzy, COSTS TOKENS): the claude -p pass IS the probe.
# Use for "is this healthy?" judgments a threshold can't express. Keep `interval`
# slow and always set `expiry` on temporary/bake watches so they self-remove.
#
# This is the manifest release-coordinator's `monitor` verb drops for a bake window.
name: pmp-bake
description: Post-deploy bake-window health for placemyparents
probe: agent
target: placemyparents
interval: 15m
expiry: 60m
severity: high
agent_evaluate: true
agent_question: "Post-deploy bake. Are payments flowing and the app healthy? Check pod restarts, api error/deadlock/timeout logs, notification_fanout_backlog, and the payment_confirmed rate. Conclude HEALTHY, SUSPECT (name the signal), or BROKEN (with rationale). Recommend only — never execute."
agent_max_turns: 15
signal: kubectl --context do-nyc3-placemyparents-k8s-prod -n placemyparents get pods
signal: kubectl --context do-nyc3-placemyparents-k8s-prod -n placemyparents logs deployment/placemyparents-api --since=10m | grep -iE 'error|fatal|deadlock|timeout' | tail -20
signal: curl -s https://api.placemyparents.com/metrics | grep -E 'notification_fanout_backlog|pool|payment_confirmed_total'
source: release-coordinator
