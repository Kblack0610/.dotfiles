# Nightly memory consolidation agent.
# Reads recent ~/.notes/{journal,inbox} entries via the wrapper, distills
# durable user-level facts, posts them to mem0 (mem0.kblab.me).
# Replaces the legacy nightly-sync.service which used dead MCPs
# (mcp__memory__*, mcp__linear__*).

NAME=nightly-sync
KIND=oneshot
DESCRIPTION='Distill recent .notes activity into mem0 nightly'
COMMAND="$HOME/.local/bin/agentctl-nightly-sync"
SCHEDULE='*-*-* 23:00:00'
INBOX="$HOME/.notes/inbox/nightly-sync"
