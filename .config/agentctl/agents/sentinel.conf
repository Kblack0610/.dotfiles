# Sentinel — always-on, observe-only monitoring companion.
#
# Loops watch-companion-loop over the registry at ~/.agent/watches/*.yaml.
# Deterministic probes (http/metric/kubectl/command) cost ZERO tokens; the
# model (claude -p) fires only on a TRIP needing diagnosis or a slow-cadence
# `probe: agent` watch (per-hour SENTINEL_AGENT_BUDGET caps it). Sentinel
# never mutates anything — it observes, judges, and notifies via agent-notify.
#
# Talk to it with the `sentinel` skill: watch / list / status / stop / pause.
# Runbook: ~/.dotfiles/.config/agentctl/SENTINEL.md
#
# (This file replaced the inert `monitor.conf` placeholder — the slot it was
# reserving for exactly this loop.)

NAME=sentinel
KIND=persistent
DESCRIPTION='Sentinel — always-on, observe-only watch companion (registry loop)'
COMMAND="$HOME/.local/bin/watch-companion-loop daemon"
AUTOSTART=yes
# Agent runtime log (activity.log) — runtime axis, NOT the notes vault.
INBOX="$HOME/.local/state/agentctl/sentinel"
