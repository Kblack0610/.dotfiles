# project-index — refresh the cross-project index AUTO block.
#
# ~/.notes/lab/projects/index.md is the human source of truth for project STATUS: the
# hand-curated lanes (## Current / ## Next version / ## Backlog / ## Prod / ## Archived)
# above AUTO:START are edited by hand to move projects around, and the `## Current` lane
# drives the daily note's Current Projects (notes-cli daily.rs). This job only fills the
# AUTO block — a deterministic mirror of the project folders + git versions. No LLM/network.
#
# Two triggers share the agentctl@project-index.service: this daily timer (backstop, catches
# version bumps with no folder move) and regen-project-index.path (instant, on a folder move).
# Runs 04:30, after lab-sync (04:00).

NAME=project-index
KIND=oneshot
DESCRIPTION='Refresh the cross-project index AUTO block (lab folders + git -> index.md)'
COMMAND="$HOME/.local/bin/agentctl-project-index"
SCHEDULE='*-*-* 04:30:00'
# Agent runtime log (activity.log) — runtime axis, NOT the notes vault (two-axis rule).
INBOX="$HOME/.local/state/agentctl/project-index"
