# Example persistent agent placeholder. Replace COMMAND with your own
# loop (a watcher script, polling daemon, etc.). AUTOSTART=no by default
# so dropping this file in doesn't immediately spawn anything.
#
# When implementing your loop, write activity to "$AGENTCTL_INBOX/activity.log"
# so 'agentctl status monitor' shows recent activity.

NAME=monitor
KIND=persistent
DESCRIPTION='Persistent demo agent — replace COMMAND with your own loop'
COMMAND='/usr/bin/sleep infinity'
AUTOSTART=no
INBOX="$HOME/.notes/inbox/monitor"
