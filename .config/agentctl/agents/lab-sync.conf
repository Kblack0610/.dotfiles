# lab-sync — refresh the lab "Release & status feed" for active projects.
#
# The lab (~/.notes/lab/projects/current/{name}/) is the human↔agent project BUS:
# the slow, durable layer between the fast ~/.agent runtime and the in-repo CHANGELOG.
# This job mirrors git + ~/.agent into each project's summary.md AUTO block — the human
# "## → For the agents" comms section is never touched. Deterministic (no LLM/network).
#
# Cadence is deliberately SLOW (weekly) — this is the high-altitude, low-frequency layer,
# the opposite of ~/.agent's 15-min churn. Runs Monday 04:00, after dream (03:00) so the
# feed reflects the latest consolidation. Event triggers (release / wind-down / manual
# /lab-sync) refresh it between weekly runs.
#
# COMMAND calls the wrapper directly — NOT `claude --print /lab-sync` (the slash command
# itself shells out to this same wrapper). Split: nightly-sync(23:00 notes->mem0),
# dream(03:00 corpus->lessons/memory), lab-sync(weekly git+.agent->lab feed).

NAME=lab-sync
KIND=oneshot
DESCRIPTION='Refresh the lab Release & status feed (git + ~/.agent -> summary.md AUTO block)'
COMMAND="$HOME/.local/bin/agentctl-lab-sync"
SCHEDULE='Mon *-*-* 04:00:00'
# Agent runtime log (activity.log) — runtime axis, NOT the notes vault (two-axis rule).
INBOX="$HOME/.local/state/agentctl/lab-sync"
