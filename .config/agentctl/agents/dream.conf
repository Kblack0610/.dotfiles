# Dreaming — nightly memory consolidation over the agent corpus.
# Three-phase sleep cycle (light/REM/deep) + evidence-based scoring, ported from
# OpenClaw and adapted to this system's substrate (evals/lessons/sessions/notes/git).
# Implemented by ~/.local/bin/agentctl-dream (the headless twin of the /dream slash
# command, the way agentctl-nightly-sync pairs with /remember).
#
# COMMAND calls the wrapper directly — NOT `claude --print /dream`, which would nest
# a second claude (the slash command itself shells out to this same wrapper).
# Split: nightly-sync (23:00) = notes->mem0;  dream (03:00) = corpus->lessons/memory/mem0-queue.

NAME=dream
KIND=oneshot
DESCRIPTION='Dreaming: consolidate the agent corpus into lessons/memory/mem0-queue'
COMMAND="$HOME/.local/bin/agentctl-dream"
SCHEDULE='*-*-* 03:00:00'
# Agent runtime log (activity.log) — runtime axis, NOT the notes vault (two-axis rule).
INBOX="$HOME/.local/state/agentctl/dream"
