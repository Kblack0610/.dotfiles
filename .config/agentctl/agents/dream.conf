# Example oneshot agent: distill eval corpus to lessons + mem0 entries.
# Runs nightly at 03:00. The /dream slash command itself is implemented
# separately — until then this agent will run and fail, which is fine
# for testing supervisor wiring.

NAME=dream
KIND=oneshot
DESCRIPTION='Distill eval corpus to lessons + mem0 entries'
COMMAND='claude --print /dream'
SCHEDULE='*-*-* 03:00:00'
INBOX="$HOME/.notes/inbox/dream"
