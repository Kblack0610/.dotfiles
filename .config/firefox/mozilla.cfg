// First line is required as a comment by Firefox autoconfig parser; do not remove.
// Sets the new tab page URL natively, bypassing the WebExtension new-tab API
// so Simple Tab Groups doesn't lose the race when categorizing new tabs.
try {
  const { AboutNewTab } = ChromeUtils.importESModule("resource:///modules/AboutNewTab.sys.mjs");
  AboutNewTab.newTabURL = "about:newtab";
} catch (e) {
  Components.utils.reportError(e);
}
